<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Eligibility Predictor</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="container">
        <h2>Credit Card Eligibility Predictor</h2>

        <form id="predictionForm">

            <label>Gender (0 = Female, 1 = Male):</label>
            <input type="number" id="gender" required>

            <label>Annual Income:</label>
            <input type="number" id="income" required>

            <label>Income Type (Encoded Value):</label>
            <input type="number" id="income_type" required>

            <label>Education Level (Encoded Value):</label>
            <input type="number" id="education" required>

            <button type="submit">Predict Eligibility</button>
        </form>

        <div id="result"></div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
