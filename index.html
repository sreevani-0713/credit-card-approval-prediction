<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Eligibility Predictor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>
    
    <div class="container">
        <div class="header">
            <h2>Credit Card Eligibility</h2>
            <p>Check your approval odds instantly using our ML model.</p>
        </div>
        
        <form id="predictionForm">
            <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" required>
                    <option value="" disabled selected>Select Gender</option>
                    <option value="0">Female</option>
                    <option value="1">Male</option>
                </select>
            </div>

            <div class="form-group">
                <label for="income">Annual Income ($)</label>
                <input type="number" id="income" placeholder="e.g. 75000" required min="0">
            </div>

            <div class="form-group">
                <label for="incomeType">Income Type</label>
                <select id="incomeType" required>
                    <option value="" disabled selected>Select Income Type</option>
                    <option value="0">Commercial</option>
                    <option value="1">State</option>
                    <option value="2">Working</option>
                </select>
            </div>

            <div class="form-group">
                <label for="education">Education Level</label>
                <select id="education" required>
                    <option value="" disabled selected>Select Education</option>
                    <option value="1">High School</option>
                    <option value="0">Bachelor's Degree</option>
                    <option value="2">Master's Degree</option>
                    <option value="3">PhD</option>
                </select>
            </div>

            <button type="submit" id="submitBtn">
                <span>Evaluate Eligibility</span>
                <div class="spinner" id="spinner"></div>
            </button>
        </form>
        
        <div id="result-container" class="hidden">
            <div id="result-icon"></div>
            <div id="result-text"></div>
            <div id="result-reason" style="font-size: 13px; margin-top: 8px; opacity: 0.9; font-weight: 400;"></div>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
